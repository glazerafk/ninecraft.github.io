<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NineCraft</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#07070b;
  color:#fff;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:24px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border:1px solid #222;
  border-radius:999px;
  background:#111;
}

.brand{
  font-weight:900;
  letter-spacing:3px;
}

.btn{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid #333;
  background:#1a1a1a;
  color:white;
  cursor:pointer;
}

.hero{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:16px;
  margin-top:20px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:16px;
  padding:18px;
}

h1{
  margin:0;
  font-size:48px;
}

.sub{
  color:#aaa;
  margin-top:8px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:16px;
}

.box{
  background:#151515;
  padding:12px;
  border-radius:12px;
  border:1px solid #222;
}

.label{
  font-size:12px;
  color:#888;
}

.value{
  font-size:18px;
  font-weight:800;
  margin-top:6px;
}

.online{color:#2ee59d}
.offline{color:#ff4d6d}

.ip{
  margin-top:10px;
  color:#aaa;
}

.motd{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#0e0e0e;
  border:1px solid #222;
  min-height:60px;
  white-space:pre-line;
}

.small{
  color:#888;
  font-size:14px;
  line-height:1.5;
}

@media(max-width:800px){
  .hero{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrap">

<header>
  <div class="brand">NINECRAFT</div>
  <button class="btn" onclick="update()">Atualizar</button>
</header>

<div class="hero">

  <div class="card">
    <h1>NineCraft</h1>
    <div class="sub">semi anarquia • PvP liberado • survival raiz</div>

    <div class="grid">
      <div class="box">
        <div class="label">Java</div>
        <div id="java" class="value">...</div>
      </div>
      <div class="box">
        <div class="label">Bedrock</div>
        <div id="bedrock" class="value">...</div>
      </div>
      <div class="box">
        <div class="label">Players</div>
        <div id="players" class="value">0</div>
      </div>
    </div>

    <div class="motd" id="motd">carregando...</div>
  </div>

  <div class="card">
    <div class="small">
      <b>ENTRE AGORA</b><br><br>

      Java:<br>
      NineCraft.bed.net.br<br><br>

      Bedrock:<br>
      ultra-08.bedhosting.com.br:25602<br><br>

      status real via API
    </div>
  </div>

</div>

</div>

<script>

const JAVA = "NineCraft.bed.net.br";
const BED = "ultra-08.bedhosting.com.br:25602";

const API_J = `https://api.mcsrvstat.us/3/${JAVA}`;
const API_B = `https://api.mcsrvstat.us/bedrock/3/${BED}`;

async function get(url){
  const r = await fetch(url);
  return r.json();
}

async function update(){
  try{
    const [j,b] = await Promise.all([get(API_J),get(API_B)]);

    document.getElementById("java").textContent = j.online ? "ONLINE" : "OFFLINE";
    document.getElementById("java").className = "value " + (j.online ? "online":"offline");

    document.getElementById("bedrock").textContent = b.online ? "ONLINE" : "OFFLINE";
    document.getElementById("bedrock").className = "value " + (b.online ? "online":"offline");

    const p = (j.players?.online||0)+(b.players?.online||0);
    document.getElementById("players").textContent = p;

    document.getElementById("motd").textContent =
      j.motd?.clean || b.motd?.clean || "NineCraft online";

  }catch(e){
    console.log(e);
  }
}

update();
setInterval(update, 60000);

</script>

</body>
</html>
